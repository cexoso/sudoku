name: Build and Deploy Storybook to GitHub Pages

# 触发条件：推送到 main 分支时执行（可根据你的主分支名调整，比如 master）
on:
  push:
    branches: [main]

# 赋予 Action 部署 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 配置工作流作业
jobs:
  deploy-storybook:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境（请根据你的项目实际 Node 版本调整，比如 18.x/20.x）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm' # 缓存 npm 依赖，加速构建

      # 3. 安装项目依赖
      - name: Install dependencies
        run: pnpm install

      # 4. 构建 Storybook（对应你 package.json 中的 build-storybook 脚本）
      - name: Build Storybook
        run: pnpm build-storybook

      # 5. 配置 GitHub Pages 部署环境
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. 上传 Storybook 构建产物（默认构建产物在 storybook-static 目录，需确认）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./storybook-static # Storybook 构建后的静态文件目录

      # 7. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
